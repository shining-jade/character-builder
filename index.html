<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>나만의 캐릭터 프롬프트 빌더</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #eef3f7;
      --ink: #1f2937;
      --muted: #64748b;
      --line: #d8e0e8;
      --line-strong: #aebdca;
      --teal: #0f9f9a;
      --teal-dark: #087773;
      --coral: #ff6b6b;
      --blue: #3b82f6;
      --yellow: #f7c948;
      --violet: #8b5cf6;
      --green: #22a06b;
      --shadow: 0 16px 36px rgba(31, 41, 55, .10);
      --radius: 8px;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(15, 159, 154, .08) 0 1px, transparent 1px 64px),
        linear-gradient(0deg, rgba(59, 130, 246, .08) 0 1px, transparent 1px 64px),
        var(--bg);
    }

    button, textarea, input { font: inherit; }

    button {
      cursor: pointer;
      border: 0;
    }

    .app {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 22px clamp(14px, 2.4vw, 32px) 32px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      margin-bottom: 16px;
    }

    .hero-sample {
      width: min(360px, 36vw);
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .92);
      color: var(--ink);
      text-align: left;
      box-shadow: 0 10px 22px rgba(31, 41, 55, .08);
    }

    .hero-sample img {
      width: 82px;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .hero-sample strong {
      display: block;
      margin-bottom: 3px;
      font-size: .9rem;
      line-height: 1.25;
    }

    .hero-sample span {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: var(--muted);
      font-size: .78rem;
      line-height: 1.35;
      word-break: keep-all;
    }

    .sample-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(15, 23, 42, .62);
    }

    .sample-modal.open {
      display: grid;
    }

    .sample-dialog {
      width: min(920px, 100%);
      max-height: min(92vh, 980px);
      overflow: auto;
      padding: 16px;
      border-radius: var(--radius);
      background: #fff;
      box-shadow: 0 24px 60px rgba(0, 0, 0, .24);
    }

    .sample-dialog-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .sample-dialog h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      background: #e8eef5;
      color: var(--ink);
      font-weight: 900;
    }

    .sample-dialog img {
      width: 100%;
      max-height: 58vh;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .sample-dialog-copy {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: .88rem;
      line-height: 1.55;
      white-space: pre-line;
      word-break: keep-all;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 2.3vw, 2.35rem);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.55;
      word-break: keep-all;
    }

    .shell {
      display: grid;
      grid-template-columns: 216px minmax(0, 1fr) 390px;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, .94);
      border: 1px solid rgba(216, 224, 232, .95);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .rail {
      padding: 14px;
      position: sticky;
      top: 16px;
    }

    .step {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: .84rem;
      font-weight: 800;
    }

    .category-list {
      display: grid;
      gap: 7px;
    }

    .reset-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-bottom: 10px;
    }

    .reset-btn {
      min-height: 36px;
      padding: 8px 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f8fafc;
      color: #475569;
      font-size: .78rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .reset-btn:hover {
      border-color: var(--teal);
      color: var(--teal-dark);
      background: #e6fbf8;
    }

    .category-btn {
      width: 100%;
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      text-align: left;
      font-weight: 800;
    }

    .category-btn small {
      color: var(--muted);
      font-weight: 700;
    }

    .category-btn small.empty {
      color: #94a3b8;
    }

    .category-btn.active {
      border-color: var(--teal);
      background: #e6fbf8;
      color: var(--teal-dark);
      box-shadow: inset 4px 0 0 var(--teal);
    }

    .stage {
      min-width: 0;
      padding: 16px;
    }

    .stage-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 14px;
      margin-bottom: 12px;
    }

    .stage h2, .result h2 {
      margin: 0;
      font-size: 1.12rem;
      letter-spacing: 0;
    }

    .stage-desc {
      margin: 5px 0 0;
      color: var(--muted);
      line-height: 1.45;
      word-break: keep-all;
    }

    .file-pill {
      flex: 0 0 auto;
      max-width: min(330px, 48%);
      padding: 7px 10px;
      border: 1px solid #c9d5e2;
      border-radius: 999px;
      background: #f8fafc;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .preview-zone {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) 260px;
      gap: 14px;
      align-items: stretch;
      position: sticky;
      top: 16px;
      z-index: 4;
      padding-bottom: 14px;
      background: rgba(255, 255, 255, .97);
      border-radius: var(--radius);
      box-shadow: 0 18px 34px rgba(15, 23, 42, .08);
    }

    .main-preview {
      min-height: 430px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background:
        linear-gradient(45deg, #f8fafc 25%, transparent 25%),
        linear-gradient(-45deg, #f8fafc 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f8fafc 75%),
        linear-gradient(-45deg, transparent 75%, #f8fafc 75%),
        #fff;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      background-size: 24px 24px;
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
    }

    .main-preview img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #fff;
      display: block;
    }

    .sprite-preview {
      width: 100%;
      height: 100%;
      background-repeat: no-repeat;
      background-color: #fff;
      background-size: var(--sprite-size, cover);
      background-position: var(--sprite-pos, center);
    }

    .sprite-frame {
      width: auto;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: var(--cell-aspect, 1);
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #fff;
    }

    .main-preview .sprite-frame {
      height: 96%;
    }

    .thumb-media .sprite-frame {
      height: 96%;
    }

    .sprite-frame .sprite-preview {
      width: 100%;
      height: 100%;
      transform: scale(1.025);
      transform-origin: center;
    }

    .placeholder-preview {
      width: min(78%, 360px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      padding: 20px;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      text-align: center;
      box-shadow: 0 16px 34px rgba(31, 41, 55, .10);
    }

    .placeholder-figure {
      width: min(170px, 58%);
      aspect-ratio: .55;
      border-radius: 999px 999px 12px 12px;
      background:
        radial-gradient(circle at 50% 19%, #f8d1b6 0 21%, transparent 22%),
        radial-gradient(circle at 41% 18%, #1f2937 0 3%, transparent 4%),
        radial-gradient(circle at 59% 18%, #1f2937 0 3%, transparent 4%),
        linear-gradient(var(--accent, var(--teal)) 0 46%, #2f6fb6 46% 78%, #1f2937 78%);
      margin: 0 auto 16px;
      position: relative;
    }

    .placeholder-preview.outfit-color-card {
      aspect-ratio: auto;
      min-height: 330px;
      gap: 8px;
    }

    .outfit-color-figure {
      --top-color: #ffffff;
      --bottom-color: #ffffff;
      --shoes-color: #ffffff;
      width: min(190px, 64%);
      aspect-ratio: .74;
      margin: 0 auto 12px;
      position: relative;
      overflow: visible;
      background: transparent;
    }

    .outfit-color-figure::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: 42%;
      aspect-ratio: 1;
      transform: translateX(-50%);
      border-radius: 50%;
      border: 1px solid rgba(203, 213, 225, .9);
      background: #f8d1b6;
      z-index: 1;
    }

    .outfit-layer {
      position: absolute;
      left: 10%;
      right: 10%;
      height: 20%;
      border: 1px solid rgba(15, 23, 42, .12);
      border-bottom: 0;
    }

    .outfit-layer.top {
      top: 31%;
      border-radius: 10px 10px 0 0;
      background: var(--top-color);
    }

    .outfit-layer.bottom {
      top: 51%;
      background: var(--bottom-color);
    }

    .outfit-layer.shoes {
      top: 71%;
      border-bottom: 1px solid rgba(15, 23, 42, .12);
      border-radius: 0 0 6px 6px;
      background: var(--shoes-color);
    }

    .thumb-media .outfit-color-figure {
      width: 70%;
      height: auto;
      margin: auto;
      aspect-ratio: .62;
    }

    .placeholder-preview strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .placeholder-preview span {
      display: block;
      color: var(--muted);
      font-size: .88rem;
      line-height: 1.45;
      word-break: keep-all;
    }

    .empty-preview {
      width: min(78%, 360px);
      min-height: 180px;
      display: grid;
      place-items: center;
      padding: 20px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .72);
      color: var(--muted);
      text-align: center;
      font-weight: 800;
      line-height: 1.5;
      word-break: keep-all;
    }

    .detail-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 13px;
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .detail-name {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 900;
    }

    .detail-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      word-break: keep-all;
    }

    .mini-meta {
      display: grid;
      gap: 7px;
      padding: 10px;
      border-radius: var(--radius);
      background: var(--surface-2);
      font-size: .82rem;
      color: #475569;
      overflow-wrap: anywhere;
    }

    .thumb-section {
      margin-top: 15px;
    }

    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(116px, 1fr));
      gap: 10px;
    }

    .thumb {
      min-height: 126px;
      display: grid;
      grid-template-rows: 94px auto;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      text-align: center;
      font-weight: 800;
    }

    .thumb.active {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15, 159, 154, .16);
    }

    .thumb.reset-thumb {
      min-height: 72px;
      grid-template-rows: 1fr;
      background: #f8fafc;
      color: #475569;
      border-style: dashed;
    }

    .thumb-media {
      border-radius: 6px;
      background: #f8fafc;
      border: 1px solid #e7edf3;
      overflow: hidden;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: .78rem;
    }

    .thumb-media img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #fff;
    }

    .thumb-media .sprite-preview {
      width: 100%;
      height: 100%;
    }

    .swatch {
      width: 100%;
      height: 100%;
      background: var(--swatch);
    }

    .item-preview {
      --item-color: #ffffff;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background: #fff;
    }

    .main-preview .item-preview {
      width: min(72%, 360px);
      height: auto;
      aspect-ratio: 1;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 16px 34px rgba(31, 41, 55, .10);
    }

    .item-art {
      position: relative;
      width: 72%;
      height: 72%;
    }

    .top-item .item-art::before {
      content: "";
      position: absolute;
      left: 31%;
      top: 22%;
      width: 38%;
      height: 48%;
      border: 3px solid #334155;
      border-radius: 12px 12px 18px 18px;
      background: var(--item-color);
      box-shadow:
        -30px 6px 0 -7px var(--item-color),
        30px 6px 0 -7px var(--item-color),
        -30px 6px 0 -4px #334155,
        30px 6px 0 -4px #334155;
    }

    .top-item .item-art::after {
      content: "";
      position: absolute;
      left: 43%;
      top: 22%;
      width: 14%;
      height: 10%;
      border: 3px solid #334155;
      border-top: 0;
      border-radius: 0 0 999px 999px;
      background: #fff;
    }

    .bottom-item .item-art::before,
    .bottom-item .item-art::after {
      content: "";
      position: absolute;
      top: 23%;
      width: 22%;
      height: 50%;
      border: 3px solid #334155;
      background: var(--item-color);
    }

    .bottom-item .item-art::before {
      left: 28%;
      border-radius: 12px 8px 14px 14px;
      transform: skewX(-4deg);
    }

    .bottom-item .item-art::after {
      right: 28%;
      border-radius: 8px 12px 14px 14px;
      transform: skewX(4deg);
    }

    .bottom-item.shorts .item-art::before,
    .bottom-item.shorts .item-art::after {
      height: 34%;
    }

    .bottom-item.skirt .item-art::before {
      left: 24%;
      top: 26%;
      width: 52%;
      height: 42%;
      border-radius: 10px 10px 22px 22px;
      transform: perspective(80px) rotateX(10deg);
    }

    .bottom-item.skirt .item-art::after {
      display: none;
    }

    .shoes-item .item-art::before,
    .shoes-item .item-art::after {
      content: "";
      position: absolute;
      top: 42%;
      width: 36%;
      height: 22%;
      border: 3px solid #334155;
      border-radius: 999px 999px 12px 12px;
      background: var(--item-color);
    }

    .shoes-item .item-art::before {
      left: 10%;
      transform: rotate(-7deg);
    }

    .shoes-item .item-art::after {
      right: 10%;
      transform: rotate(7deg);
    }

    .thumb span {
      align-self: center;
      font-size: .86rem;
      line-height: 1.28;
      word-break: keep-all;
    }

    .result {
      padding: 16px;
      position: sticky;
      top: 16px;
      display: grid;
      gap: 13px;
    }

    .summary {
      margin: 0;
      padding: 11px 12px;
      border-radius: var(--radius);
      background: #e9f7f5;
      color: #0b6865;
      font-weight: 800;
      line-height: 1.45;
      word-break: keep-all;
      white-space: pre-line;
    }

    .prompt-block {
      display: grid;
      gap: 7px;
    }

    .prompt-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: .88rem;
      color: var(--muted);
      font-weight: 900;
    }

    textarea {
      width: 100%;
      min-height: 116px;
      resize: vertical;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: #fbfdff;
      line-height: 1.55;
      outline: none;
    }

    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15, 159, 154, .16);
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .action {
      min-height: 40px;
      padding: 10px 13px;
      border-radius: var(--radius);
      background: var(--ink);
      color: #fff;
      font-weight: 900;
    }

    .action.secondary {
      background: #e8eef5;
      color: #223044;
    }

    .sample {
      border-top: 1px solid var(--line);
      padding-top: 13px;
      display: grid;
      gap: 9px;
    }

    .sample img {
      width: 100%;
      max-height: 210px;
      object-fit: contain;
      background: #fff;
      border-radius: var(--radius);
      border: 1px solid var(--line);
    }

    .base-prompt {
      margin: 0;
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.5;
      word-break: keep-all;
    }

    .toast {
      min-height: 20px;
      color: var(--green);
      font-weight: 900;
      font-size: .9rem;
    }

    @media (max-width: 1180px) {
      .shell {
        grid-template-columns: 190px minmax(0, 1fr);
      }

      .result {
        grid-column: 1 / -1;
        position: static;
      }
    }

    @media (max-width: 820px) {
      .topbar {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .hero-sample {
        width: 100%;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      .rail {
        position: static;
      }

      .category-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .preview-zone {
        grid-template-columns: 1fr;
        position: static;
        padding-bottom: 0;
        box-shadow: none;
      }

      .main-preview {
        min-height: 340px;
      }

      .file-pill {
        max-width: 100%;
      }
    }

    @media (max-width: 520px) {
      .app {
        padding-inline: 10px;
      }

      .category-list {
        grid-template-columns: 1fr;
      }

      .stage-head {
        display: grid;
      }

      .thumb-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>나만의 캐릭터 프롬프트 빌더</h1>
        <p class="subtitle">고른 항목으로 영어와 한국어 프롬프트를 바로 만들어요.</p>
      </div>
      <button class="hero-sample" type="button" id="openSampleModal" aria-haspopup="dialog">
        <img src="assets/completed-sns-character-sample.jpg" alt="">
        <span>
          <strong>완성 예시</strong>
          <span>SNS 프로필 화면 앞 웹툰 스타일 캐릭터</span>
        </span>
      </button>
    </header>

    <div class="sample-modal" id="sampleModal" role="dialog" aria-modal="true" aria-labelledby="sampleModalTitle">
      <div class="sample-dialog">
        <div class="sample-dialog-head">
          <h2 id="sampleModalTitle">완성 예시</h2>
          <button class="icon-btn" type="button" id="closeSampleModal" aria-label="닫기">X</button>
        </div>
        <img src="assets/completed-sns-character-sample.jpg" alt="SNS 프로필 화면 앞에 앉아 있는 웹툰 스타일 캐릭터 완성 예시">
        <p class="sample-dialog-copy" id="sampleModalCopy"></p>
      </div>
    </div>

    <main class="shell">
      <aside class="panel rail" aria-label="카테고리">
        <p class="step"><span>1. 카테고리</span><span id="categoryCount"></span></p>
        <div class="reset-row">
          <button class="reset-btn" type="button" id="resetActive">현재 초기화</button>

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(stateKey) || "{}");
        const selections = normalizeSelections(saved.selections || {});
        return {
          selections,
          activeCategory: getCategory(saved.activeCategory || "usage").key
        };
      } catch {
        return { selections: { ...defaultSelections }, activeCategory: "usage" };
      }
    }

    function normalizeSelections(savedSelections) {
      return Object.fromEntries(categories.map(category => {
        const hasSavedValue = Object.prototype.hasOwnProperty.call(savedSelections, category.key);
        const raw = hasSavedValue ? savedSelections[category.key] : defaultSelections[category.key];
        const index = raw === null || raw === undefined || raw === "" ? null : Number(raw);
        const valid = Number.isInteger(index) && index >= 0 && index < category.options.length ? index : null;
        return [category.key, valid];
      }));
    }

    function saveState() {
      localStorage.setItem(stateKey, JSON.stringify({
        selections: state.selections,
        activeCategory
      }));
    }

      renderCategories();
      renderStage();
      renderPrompts();

    function renderCategories() {
      categoryList.innerHTML = "";
      categoryCount.textContent = `${categories.length}개`;
      categories.forEach(category => {
        const selected = getSelected(category);
        const button = document.createElement("button");
        button.type = "button";
        button.className = `category-btn${category.key === activeCategory ? " active" : ""}`;
        const selectedLabel = selected ? selected[0] : "";
        button.innerHTML = `<span>${category.label}</span><small class="${selected ? "" : "empty"}">${selectedLabel}</small>`;
        button.addEventListener("click", () => {
          activeCategory = category.key;
          saveState();
          render();
        });
        categoryList.appendChild(button);
      });
    }

    function renderStage() {
      const category = getCategory(activeCategory);
      const selected = getSelected(category);
      categoryTitle.textContent = category.label;
      categoryDesc.textContent = category.desc;
      if (!selected) {
        filePath.textContent = "선택 전";
        optionName.textContent = "항목을 선택해 주세요";
        optionDesc.textContent = `${category.label} 옵션을 누르면 해당 부분만 바뀐 예시가 표시됩니다.`;
        englishValue.textContent = "영어값: 선택 전";
        changeRule.textContent = `규칙: ${category.rule}`;
        showEmptyPreview(category);
        renderThumbs(category);
        return;
      }

      const option = optionObject(category, selected, selectedIndex(category));
      filePath.textContent = previewPathLabel(category, option);
      optionName.textContent = option.ko;
      optionDesc.textContent = option.desc;
      englishValue.textContent = option.en ? `영어값: ${option.en}` : "영어값: 기준 캐릭터 유지";

      renderMainPreview(category, option);
      renderThumbs(category);
    }

    function showEmptyPreview(category) {
      mainPreview.innerHTML = "";
      const wrap = document.createElement("div");
      wrap.className = "empty-preview";
      wrap.textContent = `아래 썸네일에서 ${category.label} 옵션을 선택해 주세요.`;
      mainPreview.appendChild(wrap);
    }

    function renderMainPreview(category, option) {
      mainPreview.innerHTML = "";

      if (isItemCategory(category)) {
        mainPreview.appendChild(itemPreview(option, category));
        return;
      }

      if (category.colorOnly || option.swatch) {
        mainPreview.appendChild(isOutfitColorCategory(category) ? outfitColorPreview(option, category) : colorPreview(option, category));
        return;
      }

      const spriteSource = effectiveSprite(category);
      if (spriteSource && Number.isInteger(option.col) && Number.isInteger(option.row)) {
        mainPreview.appendChild(spritePreview(category, spriteSource, option));
        return;
      }

      const img = document.createElement("img");
      img.alt = `${category.label} - ${option.ko}`;
      img.src = option.path;
      img.addEventListener("error", () => {
        mainPreview.innerHTML = "";
        mainPreview.appendChild(placeholder(option, category));
      }, { once: true });
      mainPreview.appendChild(img);
    }

    function colorPreview(option, category) {
      const wrap = document.createElement("div");
      wrap.className = "placeholder-preview";
      wrap.style.setProperty("--accent", option.swatch || "#0f9f9a");
      wrap.innerHTML = `
        <div class="placeholder-figure"></div>
        <strong>${option.ko}</strong>
        <span>${category.label}은 이미지 파일 없이 색상 스와치와 프롬프트 값으로 처리합니다.</span>
      `;
      return wrap;
    }

    function outfitColorPreview(option, category) {
      const wrap = document.createElement("div");
      wrap.className = "placeholder-preview outfit-color-card";
      wrap.appendChild(outfitColorFigure(option, category));

      const title = document.createElement("strong");
      title.textContent = option.ko;
      const desc = document.createElement("span");
      desc.textContent = "위에서부터 상의 색, 하의 색, 신발 색입니다. 현재 선택한 색은 해당 층에만 반영됩니다.";
      wrap.append(title, desc);
      return wrap;
    }

    function outfitColorFigure(option, category) {
      const figure = document.createElement("div");
      figure.className = "outfit-color-figure";
      const colors = outfitLayerColors(option, category);
      figure.style.setProperty("--top-color", colors.top);
      figure.style.setProperty("--bottom-color", colors.bottom);
      figure.style.setProperty("--shoes-color", colors.shoes);
      figure.innerHTML = `
        <div class="outfit-layer top"></div>
        <div class="outfit-layer bottom"></div>
        <div class="outfit-layer shoes"></div>
      `;
      return figure;
    }

    function outfitLayerColors(option, category) {
      const layer = {
        top: selectedSwatch("topColor"),
        bottom: selectedSwatch("bottomColor"),
        shoes: selectedSwatch("shoesColor")
      };
      if (category.key === "topColor") layer.top = option.swatch || layer.top;
      if (category.key === "bottomColor") layer.bottom = option.swatch || layer.bottom;
      if (category.key === "shoesColor") layer.shoes = option.swatch || layer.shoes;
      return layer;
    }

    function selectedSwatch(categoryKey) {
      const category = getCategory(categoryKey);
      const selected = getSelected(category);
      if (!selected) return "#ffffff";
      const option = optionObject(category, selected, selectedIndex(category));
      return option.swatch || "#ffffff";
    }

    function isOutfitColorCategory(category) {
      return ["topColor", "bottomColor", "shoesColor"].includes(category.key);
    }

    function placeholder(option, category) {
      const wrap = document.createElement("div");
      wrap.className = "placeholder-preview";
      wrap.style.setProperty("--accent", accentFor(category.key));
      wrap.innerHTML = `
        <div class="placeholder-figure"></div>
        <strong>${option.ko}</strong>
        <span>${option.pathLabel} 파일을 추가하면 이 자리에 실제 미리보기가 표시됩니다.</span>
      `;
      return wrap;
    }

    function spritePreview(category, spriteSource, option) {
      const frame = document.createElement("div");
      frame.className = `sprite-frame${isCharacterSpriteCategory(category) ? " character-sprite" : ""}`;
      frame.style.setProperty("--cell-aspect", spriteCellAspect(spriteSource));
      const sprite = document.createElement("div");
      sprite.className = "sprite-preview";
      sprite.style.backgroundImage = `url("${spriteSource.src}")`;
      sprite.style.setProperty("--sprite-size", `${spriteSource.cols * 100}% ${spriteSource.rows * 100}%`);
      sprite.style.setProperty("--sprite-pos", spritePosition(category, spriteSource, option));
      frame.appendChild(sprite);
      return frame;
    }

    function isCharacterSpriteCategory(category) {
      return !["top", "bottom", "shoes", "glasses"].includes(category.key);
    }

    function renderThumbs(category) {
      thumbGrid.innerHTML = "";
      const resetButton = document.createElement("button");
      resetButton.type = "button";
      resetButton.className = `thumb reset-thumb${getSelected(category) ? "" : " active"}`;
      resetButton.textContent = "선택 안 함";
      resetButton.addEventListener("click", () => {
        state.selections[category.key] = null;
        saveState();
        render();
      });
      thumbGrid.appendChild(resetButton);

      category.options.forEach((raw, index) => {
        const option = optionObject(category, raw, index);
        const button = document.createElement("button");
        button.type = "button";
        button.className = `thumb${index === selectedIndex(category) ? " active" : ""}`;
        const media = document.createElement("div");
        media.className = "thumb-media";

        if (isOutfitColorCategory(category)) {
          media.appendChild(outfitColorFigure(option, category));
        } else if (category.colorOnly || option.swatch) {
          const swatch = document.createElement("div");
          swatch.className = "swatch";
          swatch.style.setProperty("--swatch", option.swatch || "#0f9f9a");
          media.appendChild(swatch);
        } else if (isItemCategory(category)) {
          media.appendChild(itemPreview(option, category));
        } else {
          const spriteSource = effectiveSprite(category);
          if (spriteSource && Number.isInteger(option.col) && Number.isInteger(option.row)) {
          media.appendChild(spritePreview(category, spriteSource, option));
          } else {
          const img = document.createElement("img");
          img.alt = option.ko;
          img.src = option.path;
          img.addEventListener("error", () => {
            media.textContent = "예시";
          }, { once: true });
          media.appendChild(img);
          }
        }

        const label = document.createElement("span");
        label.textContent = option.ko;
        button.append(media, label);
        button.addEventListener("click", () => {
          state.selections[category.key] = index;
          saveState();
          render();
        });
        thumbGrid.appendChild(button);
      });
    }

    function renderPrompts() {
      const entries = selectedEntries();
      const graphicEntry = entries.find(({ category }) => category.key === "graphic");
      const usageEntry = entries.find(({ category }) => category.key === "usage");
      const englishParts = buildEnglishParts(entries);
      const koreanParts = entries.map(({ category, option }) => `${category.label} ${option.ko}`);
      const constraintsEn = [
        usageEntry ? usageEntry.option.en : "",
        graphicEntry ? `Use ${graphicEntry.option.en} as the overall visual style reference for the entire character` : "",
        graphicEntry ? "Apply this selected graphic style consistently to the face, hair, outfit, and all changed parts" : "",
        "full body",
        "centered composition",
        "plain white background",
        "soft even lighting",
        "no unrelated brand names"
      ];
      const constraintsKo = [
        usageEntry ? `활용 유형 '${usageEntry.option.ko}'에 맞는 구성` : "",
        graphicEntry ? `그래픽 종류 '${graphicEntry.option.ko}'를 전체 기준 스타일로 적용` : "",
        graphicEntry ? "표정, 머리, 의상 등 모든 선택 요소를 같은 그래픽 스타일로 통일" : "",
        "전신 캐릭터",
        "가운데 배치",
        "흰 배경",
        "부드러운 조명",
        "관련 없는 브랜드명 금지",
        "글자 없음"
      ];

      mainPrompt.value = englishParts.length
        ? cleanPrompt([...englishParts, ...constraintsEn])
        : "";
      koreanPrompt.value = koreanParts.length
        ? cleanPromptKo([...koreanParts, ...constraintsKo])
        : "";
      summary.textContent = entries.length
        ? entries.map(({ category, option }) => `${category.label}: ${option.ko}`).join("\n")
        : "선택된 항목이 없습니다.\n필요한 카테고리를 눌러 옵션을 선택해 주세요.";
      basePrompt.textContent = `영어 예시: ${samplePromptEn}\n\n한글 예시: ${samplePromptKo}`;
    }

    function selectedEntries() {
      return categories
        .map(category => {
          const selected = getSelected(category);
          if (!selected) return null;
          return { category, option: optionObject(category, selected, selectedIndex(category)) };
        })
        .filter(Boolean);
    }

    function buildEnglishParts(entries) {
      return entries.map(({ category, option }) => {
        if (!option.en) return "";
        if (category.key === "usage") return "";
        if (category.key === "graphic") return `overall visual style: ${option.en}`;
        if (category.key === "age") return `${option.en} apparent age`;
        if (category.key === "top") return `wearing ${option.en}`;
        if (category.key === "topColor") return `top clothing color: ${option.en}`;
        if (category.key === "bottom") return option.en;
        if (category.key === "bottomColor") return `bottom clothing color: ${option.en}`;
        if (category.key === "shoes") return `wearing ${option.en}`;
        if (category.key === "shoesColor") return `shoe color: ${option.en}`;
        return option.en;
      }).filter(Boolean);
    }

    function isItemCategory(category) {
      return false;
    }

    function itemPreview(option, category) {
      const wrap = document.createElement("div");
      wrap.className = `item-preview ${category.key}-item ${itemShape(option, category)}`;
      wrap.style.setProperty("--item-color", "#ffffff");
      wrap.setAttribute("aria-label", `${category.label} - ${option.ko}`);
      wrap.innerHTML = `<div class="item-art"></div>`;
      return wrap;
    }

    function itemShape(option, category) {
      const value = option.en.toLowerCase();
      if (category.key === "bottom" && (value.includes("shorts") || value.includes("culottes"))) return "shorts";
      if (category.key === "bottom" && (value.includes("skirt") || value.includes("sarong"))) return "skirt";
      return "";
    }

    function effectiveSprite(category) {
      if (category.feminineSprite && isFeminineSelected()) return category.feminineSprite;
      return category.sprite || null;
    }

    function previewPathLabel(category, option) {
      const spriteSource = effectiveSprite(category);
      return spriteSource ? spriteSource.src : option.pathLabel;
    }

    function isFeminineSelected() {
      const gender = selectedOptionByKey("gender");
      return gender.en === "woman";
    }

    function selectedOptionByKey(key) {
      const category = getCategory(key);
      const selected = getSelected(category);
      return selected ? optionObject(category, selected, selectedIndex(category)) : emptyOption();
    }

    function getCategory(key) {
      return categories.find(category => category.key === key) || categories[0];
    }

    function optionIndexByEnglish(categoryKey, englishValue) {
      const category = getCategory(categoryKey);
      const index = category.options.findIndex(option => option[1] === englishValue);
      return index >= 0 ? index : null;
    }

    function selectedIndex(category) {
      const raw = state.selections[category.key];
      if (raw === null || raw === undefined || raw === "") return null;
      const index = Number(raw);
      return Number.isInteger(index) && index >= 0 && index < category.options.length ? index : null;
    }

    function getSelected(category) {
      const index = selectedIndex(category);
      return index === null ? null : category.options[index];
    }

    function emptyOption() {
      return { ko: "", en: "", file: "", desc: "", swatch: "", col: null, row: null, path: "", pathLabel: "" };
    }

    function optionObject(category, raw, index = 0) {
      const [ko, en, file, desc] = raw;
      const tone = category.sprite ? "" : raw[4];
      const col = category.sprite ? (Number.isInteger(raw[4]) ? raw[4] : index % category.sprite.cols) : raw[5];
      const row = category.sprite ? (Number.isInteger(raw[5]) ? raw[5] : Math.floor(index / category.sprite.cols)) : raw[6];
      const path = file === "BASE.png" ? "assets/BASE.png" : `assets/previews/${category.folder}/${file}`;
      return {
        ko,
        en,
        file,
        desc,
        index,
        swatch: colors[tone] || "",
        col,
        row,
        path,
        pathLabel: category.colorOnly ? `${category.key}:${en}` : path
      };
    }

    function spritePosition(category, spriteSource, option) {
      const useSequentialPosition = spriteSource !== category.sprite;
      const col = useSequentialPosition ? option.index % spriteSource.cols : option.col;
      const row = useSequentialPosition ? Math.floor(option.index / spriteSource.cols) : option.row;
      const x = spriteSource.cols <= 1 ? 0 : (col / (spriteSource.cols - 1)) * 100;
      const y = spriteSource.rows <= 1 ? 0 : (row / (spriteSource.rows - 1)) * 100;
      return `${x}% ${y}%`;
    }

    function accentFor(key) {
      const palette = {
        graphic: "#0f9f9a",
        viewpoint: "#3b82f6",
        feeling: "#ff6b6b",
        face: "#f7c948",
        body: "#22a06b",
        hair: "#8b5cf6",
        haircolor: "#8b5e3c",
        gender: "#ec4899",
        age: "#64748b",
        glasses: "#1f2937",
        top: "#0f9f9a",
        topColor: "#0f9f9a",
        bottom: "#3b82f6",
        bottomColor: "#3b82f6",
        shoes: "#ff6b6b",
        shoesColor: "#ff6b6b"
      };
      return palette[key] || "#0f9f9a";
    }

    function joinParts(parts) {
      return parts.map(part => String(part || "").trim()).filter(Boolean).join(" ");
    }

    function cleanPrompt(parts) {
      return parts.map(part => String(part || "").trim()).filter(Boolean).join(", ").replace(/\s+/g, " ").trim();
    }

    function cleanPromptKo(parts) {
      return parts.map(part => String(part || "").trim()).filter(Boolean).join(", ").replace(/\s+/g, " ").trim();
    }

    async function copySelectedImageSet() {
      const entries = selectedImageEntriesForCopy();
      if (!entries.length) {
        showToast("복사할 선택 이미지가 없어요.");
        return;
      }

      if (location.protocol === "file:") {
        showToast("open-copy-mode.cmd로 열고 다시 복사해 주세요.");
        return;
      }

      try {
        const blob = await selectedImagesBlob(entries);
        if (await copyPngToClipboard(blob)) {
          showToast("선택 이미지를 복사했어요.");
          return;
        }
        if (await copyImageHtmlToClipboard(blob)) {
          showToast("선택 이미지를 복사했어요.");
          return;
        }
        openImageFallback(blob);
        showToast("이미지를 새 창으로 열었어요. 이미지에서 복사해 주세요.");
      } catch {
        showToast("브라우저가 이미지 복사를 막았어요. 로컬 주소에서 다시 열어 주세요.");
      }
    }

    function selectedImageEntriesForCopy() {
      const start = categories.findIndex(category => category.key === "usage");
      const end = categories.findIndex(category => category.key === "shoesColor");
      const graphicCategory = getCategory("graphic");
      const graphicSelected = getSelected(graphicCategory);
      const graphicEntry = graphicSelected
        ? [{ category: graphicCategory, option: optionObject(graphicCategory, graphicSelected, selectedIndex(graphicCategory)), role: "그래픽 기준" }]
        : [];
      const partEntries = categories
        .slice(start, end + 1)
        .map(category => {
          if (category.key === "graphic") return null;
          const selected = getSelected(category);
          if (!selected) return null;
          return { category, option: optionObject(category, selected, selectedIndex(category)) };
        })
        .filter(Boolean);
      return [...graphicEntry, ...partEntries];
    }

    function selectedImageListText(entries) {
      return entries.map(({ category, option }) => {
        const spriteSource = effectiveSprite(category);
        const cell = spriteSource ? spriteCell(category, spriteSource, option) : null;
        const source = spriteSource ? `${spriteSource.src} (${cell.col + 1}열, ${cell.row + 1}행)` : option.pathLabel;
        return `${category.label}: ${option.ko} - ${source}`;
      }).join("\n");
    }

    async function selectedImagesBlob(entries) {
      const tileW = 176;
      const tileH = 214;
      const gap = 14;
      const pad = 22;
      const cols = Math.min(4, entries.length);
      const rows = Math.ceil(entries.length / cols);
      const canvas = document.createElement("canvas");
      canvas.width = pad * 2 + cols * tileW + (cols - 1) * gap;
      canvas.height = pad * 2 + rows * tileH + (rows - 1) * gap;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = "700 14px Pretendard, Malgun Gothic, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      for (const [index, entry] of entries.entries()) {
        const col = index % cols;
        const row = Math.floor(index / cols);
        const x = pad + col * (tileW + gap);
        const y = pad + row * (tileH + gap);
        await drawImageTile(ctx, entry, x, y, tileW, tileH);
      }

      return new Promise((resolve, reject) => {
        try {
          canvas.toBlob(blob => {
            if (blob) resolve(blob);
            else reject(new Error("image export unavailable"));
          }, "image/png");
        } catch (error) {
          reject(error);
        }
      });
    }

    async function copyPngToClipboard(blob) {
      if (!blob || !navigator.clipboard || !window.ClipboardItem) return false;
      try {
        await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
        return true;
      } catch {
        return false;
      }
    }

    async function copyImageHtmlToClipboard(blob) {
      if (!blob) return false;
      try {
        const dataUrl = await blobToDataUrl(blob);
        const holder = document.createElement("div");
        holder.contentEditable = "true";
        holder.style.position = "fixed";
        holder.style.left = "-9999px";
        holder.style.top = "0";
        holder.innerHTML = `<img src="${dataUrl}" alt="선택한 캐릭터 옵션 이미지">`;
        document.body.appendChild(holder);

        const range = document.createRange();
        range.selectNodeContents(holder);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        const copied = document.execCommand("copy");
        selection.removeAllRanges();
        holder.remove();
        return copied;
      } catch {
        return false;
      }
    }

    function openImageFallback(blob) {
      const url = URL.createObjectURL(blob);
      const win = window.open(url, "_blank");
      if (!win) {
        const link = document.createElement("a");
        link.href = url;
        link.download = "selected-character-options.png";
        link.click();
      }
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function drawImageTile(ctx, entry, x, y, width, height) {
      const { category, option } = entry;
      const mediaH = 162;
      ctx.fillStyle = "#f8fafc";
      roundRect(ctx, x, y, width, height, 8);
      ctx.fill();
      ctx.strokeStyle = "#d8e0e8";
      ctx.stroke();

      const spriteSource = effectiveSprite(category);
      if (spriteSource) {
        const image = await loadImage(spriteSource.src);
        const cell = spriteCell(category, spriteSource, option);
        const boxW = width * .82;
        const boxH = mediaH * .86;
        const aspect = spriteCellAspect(spriteSource);
        let drawW = boxH * aspect;
        let drawH = boxH;
        if (drawW > boxW) {
          drawW = boxW;
          drawH = boxW / aspect;
        }
        ctx.drawImage(
          image,
          cell.cropX * image.width,
          cell.cropY * image.height,
          cell.cropW * image.width,
          cell.cropH * image.height,
          x + (width - drawW) / 2,
          y + 10 + (mediaH - drawH) / 2,
          drawW,
          drawH
        );
      } else if (isOutfitColorCategory(category)) {
        drawOutfitColorTile(ctx, entry, x, y, width, mediaH);
      } else {
        ctx.fillStyle = option.swatch || "#eef3f7";
        roundRect(ctx, x + 16, y + 18, width - 32, mediaH - 28, 8);
        ctx.fill();
      }

      ctx.fillStyle = "#1f2937";
      ctx.fillText(entry.role || category.label, x + width / 2, y + mediaH + 18);
      ctx.fillStyle = "#64748b";
      ctx.fillText(option.ko, x + width / 2, y + mediaH + 40);
    }

    function drawOutfitColorTile(ctx, entry, x, y, width, mediaH) {
      const colors = outfitLayerColors(entry.option, entry.category);
      const figureW = width * .5;
      const figureH = mediaH * .82;
      const fx = x + (width - figureW) / 2;
      const fy = y + 12 + (mediaH - figureH) / 2;
      const headR = figureW * .21;
      const layerX = fx + figureW * .1;
      const layerW = figureW * .8;
      const topY = fy + figureH * .31;
      const layerH = figureH * .2;

      ctx.fillStyle = "#f8d1b6";
      ctx.beginPath();
      ctx.arc(fx + figureW / 2, fy + headR, headR, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(203, 213, 225, .9)";
      ctx.stroke();

      [["top", colors.top], ["bottom", colors.bottom], ["shoes", colors.shoes]].forEach(([key, color], index) => {
        ctx.fillStyle = color;
        ctx.fillRect(layerX, topY + index * layerH, layerW, layerH);
        ctx.strokeStyle = "rgba(15, 23, 42, .18)";
        ctx.strokeRect(layerX, topY + index * layerH, layerW, layerH);
      });
    }

    function spriteCell(category, spriteSource, option) {
      const useSequentialPosition = spriteSource !== category.sprite;
      const col = useSequentialPosition ? option.index % spriteSource.cols : option.col;
      const row = useSequentialPosition ? Math.floor(option.index / spriteSource.cols) : option.row;
      const inset = spriteCropInset(category);
      const x = col / spriteSource.cols;
      const y = row / spriteSource.rows;
      const w = 1 / spriteSource.cols;
      const h = 1 / spriteSource.rows;
      return {
        x,
        y,
        w,
        h,
        cropX: x + w * inset,
        cropY: y + h * inset,
        cropW: w * (1 - inset * 2),
        cropH: h * (1 - inset * 2),
        col,
        row
      };
    }

    function spriteCropInset(category) {
      return isCharacterSpriteCategory(category) ? 0.025 : 0.012;
    }

    function spriteCellAspect(spriteSource) {
      const size = spriteSheetSizes[spriteSource.src];
      if (!size) return 1;
      return (size[0] / spriteSource.cols) / (size[1] / spriteSource.rows);
    }

    async function loadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = src;
      });
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("복사했어요.");
      } catch {
        const temp = document.createElement("textarea");
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        temp.remove();
        showToast("복사했어요.");
      }
    }

    function showToast(message) {
      toast.textContent = message;
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toast.textContent = "";
      }, 1800);
    }

    function closeSampleDialog() {
      sampleModal.classList.remove("open");
    }

    sampleModalCopy.textContent = `영어 예시: ${samplePromptEn}\n\n한글 예시: ${samplePromptKo}`;
    render();
  </script>
</body>
</html>
